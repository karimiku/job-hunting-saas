openapi: "3.0.3"
info:
  title: Job Hunting SaaS API
  version: "0.1.0"
  description: 就活管理SaaSのREST API

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /api/v1/companies:
    post:
      operationId: createCompany
      summary: 企業を新規登録する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listCompanies
      summary: 企業一覧を取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  companies:
                    type: array
                    items:
                      $ref: "#/components/schemas/CompanyResponse"
                required:
                  - companies

  /api/v1/companies/{companyId}:
    parameters:
      - $ref: "#/components/parameters/CompanyId"
    get:
      operationId: getCompany
      summary: 企業を取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCompany
      summary: 企業を部分更新する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCompany
      summary: 企業を削除する
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/companies/{companyId}/aliases:
    parameters:
      - $ref: "#/components/parameters/CompanyId"
    post:
      operationId: createCompanyAlias
      summary: 企業の別名を新規登録する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyAliasRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyAliasResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listCompanyAliases
      summary: 企業の別名一覧を取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  aliases:
                    type: array
                    items:
                      $ref: "#/components/schemas/CompanyAliasResponse"
                required:
                  - aliases
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/aliases/{aliasId}:
    parameters:
      - $ref: "#/components/parameters/AliasId"
    get:
      operationId: getCompanyAlias
      summary: 企業の別名を取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyAliasResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCompanyAlias
      summary: 企業の別名を削除する
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/entries:
    post:
      operationId: createEntry
      summary: エントリーを新規登録する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntryRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listEntries
      summary: エントリー一覧を取得する
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [in_progress, offered, accepted, rejected, withdrawn]
        - name: stageKind
          in: query
          schema:
            type: string
            enum: [application, document, test, interview, group, offer, other]
        - name: source
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/EntryResponse"
                required:
                  - entries

  /api/v1/entries/{entryId}:
    parameters:
      - $ref: "#/components/parameters/EntryId"
    get:
      operationId: getEntry
      summary: エントリーを取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateEntry
      summary: エントリーを部分更新する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEntryRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteEntry
      summary: エントリーを削除する
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/entries/{entryId}/tasks:
    parameters:
      - $ref: "#/components/parameters/EntryId"
    post:
      operationId: createTask
      summary: タスクを新規登録する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listTasks
      summary: エントリーに紐づくタスク一覧を取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskResponse"
                required:
                  - tasks

  /api/v1/entries/{entryId}/stage-histories:
    parameters:
      - $ref: "#/components/parameters/EntryId"
    post:
      operationId: createStageHistory
      summary: 選考フェーズ履歴を追加する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStageHistoryRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StageHistoryResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listStageHistories
      summary: エントリーに紐づく選考フェーズ履歴一覧を取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  stageHistories:
                    type: array
                    items:
                      $ref: "#/components/schemas/StageHistoryResponse"
                required:
                  - stageHistories

  /api/v1/tasks:
    get:
      operationId: listAllTasks
      summary: ログインユーザーの全タスク一覧を取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskResponse"
                required:
                  - tasks

  /api/v1/tasks/{taskId}:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      operationId: getTask
      summary: タスクを取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTask
      summary: タスクを部分更新する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTask
      summary: タスクを削除する
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/ai-access-tokens:
    get:
      operationId: listAIAccessTokens
      summary: AI連携用アクセストークン一覧を取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIAccessTokenResponse"
                required:
                  - tokens
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAIAccessToken
      summary: AI連携用アクセストークンを発行する
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAIAccessTokenRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAIAccessTokenResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/ai-access-tokens/{tokenId}:
    parameters:
      - $ref: "#/components/parameters/AIAccessTokenId"
    delete:
      operationId: revokeAIAccessToken
      summary: AI連携用アクセストークンを失効する
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/inbox/clips:
    post:
      operationId: createInboxClip
      summary: Chrome 拡張等から保存されたページクリップを作成する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInboxClipRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxClipResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listInboxClips
      summary: 自分のページクリップ一覧を返す
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  clips:
                    type: array
                    items:
                      $ref: "#/components/schemas/InboxClipResponse"
                required:
                  - clips

  /api/v1/inbox/clips/{clipId}:
    parameters:
      - $ref: "#/components/parameters/ClipId"
    delete:
      operationId: deleteInboxClip
      summary: ページクリップを削除する
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    CompanyId:
      name: companyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ClipId:
      name: clipId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AliasId:
      name: aliasId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AIAccessTokenId:
      name: tokenId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateCompanyRequest:
      type: object
      properties:
        name:
          type: string
        memo:
          type: string
      required:
        - name

    UpdateCompanyRequest:
      type: object
      properties:
        name:
          type: string
        memo:
          type: string

    CompanyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        memo:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - memo
        - createdAt
        - updatedAt

    CreateCompanyAliasRequest:
      type: object
      properties:
        alias:
          type: string
      required:
        - alias

    CompanyAliasResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        alias:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - companyId
        - alias
        - createdAt

    CreateEntryRequest:
      type: object
      properties:
        companyId:
          type: string
          format: uuid
        route:
          type: string
        source:
          type: string
        sourceUrl:
          type: string
          format: uri
        memo:
          type: string
      required:
        - companyId
        - route
        - source

    UpdateEntryRequest:
      type: object
      properties:
        source:
          type: string
        sourceUrl:
          type: string
          format: uri
        status:
          type: string
          enum: [in_progress, offered, accepted, rejected, withdrawn]
        stageKind:
          type: string
          enum: [application, document, test, interview, group, offer, other]
        stageLabel:
          type: string
        memo:
          type: string

    EntryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        route:
          type: string
        source:
          type: string
        sourceUrl:
          type: string
          format: uri
        status:
          type: string
        stageKind:
          type: string
        stageLabel:
          type: string
        memo:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - companyId
        - route
        - source
        - status
        - stageKind
        - stageLabel
        - memo
        - createdAt
        - updatedAt

    CreateTaskRequest:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [deadline, schedule]
        dueDate:
          type: string
          format: date-time
        memo:
          type: string
      required:
        - title
        - type

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [deadline, schedule]
        status:
          type: string
          enum: [todo, done]
        dueDate:
          type: string
          format: date-time
          nullable: true
        notify:
          type: boolean
        memo:
          type: string

    TaskResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entryId:
          type: string
          format: uuid
        title:
          type: string
        type:
          type: string
        status:
          type: string
        dueDate:
          type: string
          format: date-time
          nullable: true
        notify:
          type: boolean
        memo:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - entryId
        - title
        - type
        - status
        - notify
        - memo
        - createdAt
        - updatedAt

    CreateAIAccessTokenRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 80

    AIAccessTokenResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        tokenPreview:
          type: string
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        revokedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - tokenPreview
        - createdAt

    CreateAIAccessTokenResponse:
      type: object
      properties:
        token:
          type: string
        item:
          $ref: "#/components/schemas/AIAccessTokenResponse"
      required:
        - token
        - item

    CreateStageHistoryRequest:
      type: object
      properties:
        stageKind:
          type: string
          enum: [application, document, test, interview, group, offer, other]
        stageLabel:
          type: string
        note:
          type: string
      required:
        - stageKind
        - stageLabel

    StageHistoryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entryId:
          type: string
          format: uuid
        stageKind:
          type: string
        stageLabel:
          type: string
        note:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - entryId
        - stageKind
        - stageLabel
        - note
        - createdAt

    CreateInboxClipRequest:
      type: object
      properties:
        url:
          type: string
          maxLength: 2048
        title:
          type: string
          maxLength: 512
        source:
          type: string
          maxLength: 128
        guess:
          type: string
          maxLength: 256
      required:
        - url
        - title
        - source

    InboxClipResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
        title:
          type: string
        source:
          type: string
        guess:
          type: string
        capturedAt:
          type: string
          format: date-time
      required:
        - id
        - url
        - title
        - source
        - guess
        - capturedAt

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
