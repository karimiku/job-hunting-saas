root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/server"
  cmd = "go build -o ./tmp/server ./cmd/server"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "docs", ".git", "secrets"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "toml"]
  # 再起動時に SIGINT を送って 2秒 grace（DB pool の close 等）を与える
  kill_delay = "2s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
