services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-job_hunting_dev}?sslmode=disable
      # PR #58: dev compose は Postgres を立ち上げるが Inbox 永続化が未実装 (Issue #59)。
      # cmd/server/main.go が明示 ack を要求するためここで true を渡す。本番では設定しない。
      INBOX_ALLOW_INMEMORY: "true"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-job_hunting_dev}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
      - ./sql:/sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
