# Supabase CLI local project configuration.
# Keep this focused on database migration management; the app does not use
# Supabase Data API for product data.
project_id = "job-hunting-saas"

[api]
enabled = false
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000
auto_expose_new_tables = false

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 16

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[auth]
enabled = false
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[realtime]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[storage]
enabled = false

[storage.s3_protocol]
enabled = false

[inbucket]
enabled = false
