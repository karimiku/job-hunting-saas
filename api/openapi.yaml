openapi: "3.0.3"
info:
  title: Job Hunting SaaS API
  version: "0.1.0"
  description: 就活管理SaaSのREST API

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /api/v1/companies:
    post:
      operationId: createCompany
      summary: 企業を新規登録する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listCompanies
      summary: 企業一覧を取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  companies:
                    type: array
                    items:
                      $ref: "#/components/schemas/CompanyResponse"
                required:
                  - companies

  /api/v1/companies/{companyId}:
    parameters:
      - $ref: "#/components/parameters/CompanyId"
    get:
      operationId: getCompany
      summary: 企業を取得する
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCompany
      summary: 企業を部分更新する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCompany
      summary: 企業を削除する
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    CompanyId:
      name: companyId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateCompanyRequest:
      type: object
      properties:
        name:
          type: string
        memo:
          type: string
      required:
        - name

    UpdateCompanyRequest:
      type: object
      properties:
        name:
          type: string
        memo:
          type: string

    CompanyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        memo:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - memo
        - createdAt
        - updatedAt

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
