version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries/"
    schema: "sql/schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/infra/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
