version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, frontend]

  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, backend]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      # codeql-action は init/autobuild/analyze/upload-sarif が別依存扱いのため、
      # 分割 PR になるとバージョン混在で Analyze が失敗する。常に1本にまとめる
      codeql-action:
        patterns: ["github/codeql-action*"]
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, ci]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    labels: [dependencies, docker]

  - package-ecosystem: terraform
    directory: /infra/terraform/bootstrap
    schedule:
      interval: weekly
    labels: [dependencies, terraform]

  - package-ecosystem: terraform
    directory: /infra/terraform/environments/prod
    schedule:
      interval: weekly
    labels: [dependencies, terraform]
