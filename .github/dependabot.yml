version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, frontend]

  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    labels: [dependencies, backend]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, ci]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    labels: [dependencies, docker]
