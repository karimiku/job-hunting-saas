name: Terraform CI

on:
  pull_request:
    paths:
      - infra/terraform/**
      - .github/workflows/terraform-ci.yml
  push:
    branches: [main]
    paths:
      - infra/terraform/**
      - .github/workflows/terraform-ci.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: "1.15.5"
  TF_IN_AUTOMATION: "true"

jobs:
  validate:
    name: Format + Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - name: Check formatting
        run: terraform fmt -check -recursive infra/terraform
      - name: Init bootstrap without backend
        run: terraform -chdir=infra/terraform/bootstrap init -backend=false
      - name: Validate bootstrap
        run: terraform -chdir=infra/terraform/bootstrap validate
      - name: Init prod without backend
        run: terraform -chdir=infra/terraform/environments/prod init -backend=false
      - name: Validate prod
        run: terraform -chdir=infra/terraform/environments/prod validate

  plan-prod:
    name: Production Plan
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_TERRAFORM_SERVICE_ACCOUNT != '' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: true
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}
      - name: Init prod
        run: terraform -chdir=infra/terraform/environments/prod init
      - name: Plan prod
        run: terraform -chdir=infra/terraform/environments/prod plan -input=false -no-color
