name: OpenAPI Breaking Changes

on:
  pull_request:
    paths:
      - backend/api/openapi.yaml
      - .github/workflows/openapi-diff.yml

permissions:
  contents: read

concurrency:
  group: openapi-diff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  breaking:
    name: Detect Breaking Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: "1.25.1"
          cache: false
      - name: Install oasdiff
        run: go install github.com/oasdiff/oasdiff@v1.11.7
      - name: Extract base spec
        run: |
          if git show origin/${{ github.base_ref }}:backend/api/openapi.yaml > /tmp/base-openapi.yaml 2>/dev/null; then
            echo "Base spec extracted from origin/${{ github.base_ref }}"
          else
            cat > /tmp/base-openapi.yaml <<'EOF'
          openapi: 3.0.3
          info:
            title: empty
            version: 0.0.0
          paths: {}
          EOF
          fi
      - name: Detect breaking changes
        run: oasdiff breaking /tmp/base-openapi.yaml backend/api/openapi.yaml --fail-on ERR
