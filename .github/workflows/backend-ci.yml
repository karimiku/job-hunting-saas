name: Backend CI

on:
  pull_request:
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.4"
  OAPI_CODEGEN_VERSION: "v2.6.0"
  SQLC_VERSION: "v1.31.1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.1.6
          install-mode: goinstall
          working-directory: backend

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Run tests
        working-directory: backend
        run: go test -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Build
        working-directory: backend
        run: go build ./...

  gen-drift:
    name: Generated Code Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Install codegen tools
        env:
          GOTOOLCHAIN: auto
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@${OAPI_CODEGEN_VERSION}
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@${SQLC_VERSION}
      - name: Regenerate (oapi-codegen)
        working-directory: backend/api
        run: oapi-codegen -config oapi-codegen.yaml openapi.yaml
      - name: Regenerate (sqlc)
        working-directory: backend
        run: sqlc generate
      - name: Check drift
        run: |
          if ! git -C backend diff --exit-code; then
            echo "::error::Generated code is out of date. Run 'make gen' locally and commit the result."
            exit 1
          fi

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      # Install must always succeed; an install failure is a real CI failure, not a vulnerability.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      # In -json mode govulncheck exits 0 on a successful run regardless of whether
      # vulnerabilities were found, and exits non-zero only on an execution error
      # (compile error, bad flags, etc.). This lets us treat those two cases separately:
      # an execution error always fails the job; vulnerability findings are reported
      # afterwards and are only non-blocking on pull_request.
      - name: Run govulncheck
        working-directory: backend
        run: govulncheck -json ./... > govulncheck.json
      - name: Evaluate govulncheck findings
        working-directory: backend
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
        run: |
          # A "finding" whose trace reaches a specific function is a vulnerability that is
          # actually called (matching govulncheck's default text-mode "affected" report).
          # Findings without a called function are informational and ignored here.
          # govulncheck -json emits a stream of concatenated (pretty-printed) JSON objects,
          # so we decode them sequentially with raw_decode instead of line-by-line.
          called=$(python3 - <<'PY'
          import json
          with open("govulncheck.json") as f:
              data = f.read()
          dec = json.JSONDecoder()
          idx, n, called = 0, len(data), False
          while idx < n:
              while idx < n and data[idx].isspace():
                  idx += 1
              if idx >= n:
                  break
              obj, idx = dec.raw_decode(data, idx)
              finding = obj.get("finding")
              if finding and any(frame.get("function") for frame in finding.get("trace", [])):
                  called = True
          print("true" if called else "false")
          PY
          )
          if [ "$called" = "true" ]; then
            echo "::group::govulncheck JSON output"
            cat govulncheck.json
            echo "::endgroup::"
            if [ "$IS_PR" = "true" ]; then
              echo "::warning::govulncheck found vulnerabilities that are called by this module. Non-blocking on pull requests; please review before merge."
            else
              echo "::error::govulncheck found vulnerabilities that are called by this module."
              exit 1
            fi
          else
            echo "No called vulnerabilities found by govulncheck."
          fi
