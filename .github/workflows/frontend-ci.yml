name: Frontend CI

on:
  pull_request:
    paths:
      - frontend/**
      - flake.nix
      - flake.lock
      - Makefile
      - .github/workflows/frontend-ci.yml
  push:
    branches: [main]
    paths:
      - frontend/**
      - flake.nix
      - flake.lock
      - Makefile
      - .github/workflows/frontend-ci.yml

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + Test + E2E + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main
      - if: github.event_name != 'pull_request'
        uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839 # main
      - name: Install
        run: nix develop -c make install-fe
      - name: ESLint
        run: nix develop -c make lint-fe
      - name: Test
        run: nix develop -c make test-fe
      - name: E2E
        run: nix develop -c make test-fe-e2e
      - name: Cache Next.js build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/pnpm-lock.yaml') }}-${{ hashFiles('frontend/**/*.[jt]s', 'frontend/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/pnpm-lock.yaml') }}-
      - name: Build
        run: nix develop -c make build-fe
