name: Supply Chain Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  actions-security:
    name: Actions Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Detect expression injection
        run: |
          set +e
          risky=$(grep -rEn 'run:.*\$\{\{[[:space:]]*github\.event\.(pull_request\.(title|body|head\.ref)|issue\.(title|body)|comment\.body)' .github/workflows/)
          if [ -n "$risky" ]; then
            echo "::error::Expression injection risk detected. Pass via env: instead of inline \${{ }}"
            echo "$risky"
            exit 1
          fi
      - name: Warn on unpinned actions
        run: |
          set +e
          # Find every `uses: owner/action@ref` line, then drop those whose ref is a 40-char SHA.
          # This catches @v1, @main, @master, @feature-branch — anything not immutable.
          unpinned=$(grep -rEn '^[[:space:]]*-?[[:space:]]*uses:[[:space:]]+[^@#[:space:]]+@[^[:space:]]+' .github/workflows/ \
            | grep -vE '@[a-f0-9]{40}([[:space:]]|$|#)' \
            | grep -vE 'uses:[[:space:]]+\./')
          if [ -n "$unpinned" ]; then
            echo "::warning::Actions not pinned to a 40-char commit SHA:"
            echo "$unpinned"
          fi

  osv-scan:
    name: OSV Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: google/osv-scanner-action/osv-scanner-action@75edb0fc3f7b7229ac35e8cd527c2b9b79afd94d # v2.0.2
        with:
          scan-args: |-
            --recursive
            --skip-git
            --format=sarif
            --output=osv-results.sarif
            ./
        continue-on-error: ${{ github.event_name == 'pull_request' }}
      - uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always() && hashFiles('osv-results.sarif') != ''
        with:
          sarif_file: osv-results.sarif

  scheduled-issue:
    name: File Issue from Schedule
    if: github.event_name == 'schedule' && failure()
    needs: [osv-scan, gitleaks]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const title = `🔒 Scheduled security scan failed (${date})`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,automated',
            });
            if (existing.some(i => i.title.startsWith('🔒 Scheduled security scan'))) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '定期セキュリティスキャンで問題を検出しました。',
                '',
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `Security tab: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/security/code-scanning`,
              ].join('\n'),
              labels: ['security', 'automated'],
            });
