name: Supply Chain Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  actions-security:
    name: Actions Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Detect expression injection
        run: |
          set +e
          risky=$(grep -rEn 'run:.*\$\{\{[[:space:]]*github\.event\.(pull_request\.(title|body|head\.ref)|issue\.(title|body)|comment\.body)' .github/workflows/)
          if [ -n "$risky" ]; then
            echo "::error::Expression injection risk detected. Pass event-derived values via env instead of inline expressions."
            echo "$risky"
            exit 1
          fi
      - name: Warn on unpinned actions
        run: |
          set +e
          # Find every `uses: owner/action@ref` line, then drop those whose ref is a 40-char SHA.
          # This catches @v1, @main, @master, @feature-branch — anything not immutable.
          unpinned=$(grep -rEn '^[[:space:]]*-?[[:space:]]*uses:[[:space:]]+[^@#[:space:]]+@[^[:space:]]+' .github/workflows/ \
            | grep -vE '@[a-f0-9]{40}([[:space:]]|$|#)' \
            | grep -vE 'uses:[[:space:]]+\./')
          if [ -n "$unpinned" ]; then
            echo "::warning::Actions not pinned to a 40-char commit SHA:"
            echo "$unpinned"
          fi

  osv-scan:
    name: OSV Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # osv-scanner exits 1-126 when vulnerabilities/findings are reported and 127-255
      # for actual scanner errors (e.g. 128 = no packages found, 127 = general error).
      # We must not let continue-on-error swallow the error range, so the scan step always
      # continues and we classify the outcome explicitly in the next step instead.
      - id: scan
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            scan source
            --recursive
            --format=sarif
            --output-file=osv-results.sarif
            ./
      - name: Classify scan outcome
        env:
          IS_PR: ${{ github.event_name == 'pull_request' }}
          SCAN_OUTCOME: ${{ steps.scan.outcome }}
        run: |
          # A successful scan always writes the SARIF report. If the step failed but
          # produced no SARIF, the scanner itself errored (not a vulnerability) -> always fail.
          if [ "$SCAN_OUTCOME" = "success" ]; then
            echo "osv-scanner completed with no findings."
            exit 0
          fi
          if [ ! -s osv-results.sarif ]; then
            echo "::error::osv-scanner failed to run (no SARIF produced). Treating as an execution error."
            exit 1
          fi
          # SARIF exists but the step "failed": vulnerabilities/findings were reported.
          if [ "$IS_PR" = "true" ]; then
            echo "::warning::osv-scanner found vulnerabilities. Non-blocking on pull requests; SARIF upload runs outside pull_request events."
          else
            echo "::error::osv-scanner found vulnerabilities."
            exit 1
          fi
      # Keep SARIF upload best-effort because code scanning may be unavailable on the repository plan.
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always() && github.event_name != 'pull_request' && hashFiles('osv-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: osv-results.sarif

  scheduled-issue:
    name: File Issue from Schedule
    if: github.event_name == 'schedule' && failure()
    needs: [osv-scan, gitleaks]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const title = `🔒 Scheduled security scan failed (${date})`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,automated',
            });
            if (existing.some(i => i.title.startsWith('🔒 Scheduled security scan'))) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '定期セキュリティスキャンで問題を検出しました。',
                '',
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `Security tab: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/security/code-scanning`,
              ].join('\n'),
              labels: ['security', 'automated'],
            });
